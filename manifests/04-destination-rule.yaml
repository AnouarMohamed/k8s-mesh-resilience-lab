apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: backend
  namespace: app
spec:
  host: backend
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
  trafficPolicy:
    outlierDetection:
      consecutive5xxErrors: 1
      interval: 1s
      baseEjectionTime: 15s
      maxEjectionPercent: 100
